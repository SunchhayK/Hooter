server {
    listen 80;
    server_name hooter.labyrinth.buzz.com;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hooter.labyrinth.buzz.com;

    ssl_certificate     /etc/letsencrypt/live/hooter.labyrinth.buzz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hooter.labyrinth.buzz.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy OAuth callback to the bot's internal HTTP server
    location /oauth/callback {
        proxy_pass         http://bot:6767/oauth/callback;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Block everything else
    location / {
        return 404;
    }
}
